<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MQ TDList</title>

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

  <div class="login-container">

    <!-- LEFT -->
    <div class="left">
      <img src="assets/loginimg.png" alt="illustration">
    </div>

    <!-- RIGHT -->
    <div class="right">

      <!-- HEADER -->
      <div class="header">
        <h1 class="logo">MQ TDList</h1>
        <div class="divider"></div>
        <p class="subtitle">Set Your Priorities</p>
      </div>


    <!-- FORM -->
    <form id="loginForm" class="form">
        <h2 class="login-title">Sign In</h2>

        <!-- USERNAME -->
        <div class="input-group">
            <i class="fa fa-user"></i>
            <input type="text" id="username" placeholder="Username">
        </div>

        <!-- PASSWORD -->
        <div class="input-group">
            <i class="fa fa-lock"></i>
            <input type="password" id="password" placeholder="Password">
        </div>

        <!-- Remember -->
        <div class="remember">
            <input type="checkbox" id="remember">
            <label for="remember">Remember Me</label>
        </div>

        <!-- BUTTON -->
        <button type="submit" id="loginBtn">Login</button>

        <!-- SOCIAL -->
        <p class="login-with">Or login with</p>

        <div class="social-login">
          <button class="google"><i class="fab fa-google"></i></button>
          <button class="facebook"><i class="fab fa-facebook-f"></i></button>
          <button class="twitter"><i class="fab fa-twitter"></i></button>
        </div>
        
    </form>

    </div>

  </div>

  <script src="login.js"></script>
</body>
</html>
