<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MQ TDList - Dashboard</title>
  <link rel="stylesheet" href="styledashboard.css">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

  <div class="dashboard">

    <!-- HEADER (FULL WIDTH) -->
    <header class="header-dashboard">

    <div class="header-left">
        <h1 class="logo">MQ TDList</h1>
    </div>

    <div class="header-center">
    <div class="search-box">
        <input type="text" placeholder="Search your task here...">
        <button class="search-btn">
        <i class="fa-solid fa-magnifying-glass"></i>
        </button>
    </div>
    </div>

    <div class="header-right">
    <button class="notif-btn">
      <i class="fa-regular fa-bell"></i>
    </button>

    <div class="date">
      <p id="day"></p>
      <span id="fullDate"></span>
    </div>
    </div>

    </header>

    <!-- BODY -->
    <div class="dashboard-body">

        <!-- SIDEBAR -->
        <aside class="sidebar">
          <div class="profile">
            <img src="assets/profile.jpg" alt="profile">
            <h3 id="userName">User</h3>
            <p id="userEmail">user@example.com</p>
          </div>

          <ul class="menu">
            <li class="active"><i class="fa-solid fa-house"></i> Dashboard</li>
            <li><i class="fa-solid fa-star"></i> Priority Task</li>
            <li><i class="fa-solid fa-calendar"></i> Calendar</li>
            <li><i class="fa-solid fa-list"></i> All Task</li>
            <li><i class="fa-solid fa-gear"></i> Settings</li>
            <li><i class="fa-solid fa-circle-question"></i> Help</li>
          </ul>

          <div class="logout" onclick="logout()">
            <i class="fa-solid fa-right-from-bracket"></i> Logout
          </div>
        </aside>

        <!-- MAIN -->
        <main class="main-content">
          <section class="task-card" aria-labelledby="welcome-title">
            <h1 id="welcome-title">Welcome Back, Maziya 💕</h1>

            <form class="task-form" id="taskForm">
              <input id="taskInput" type="text" placeholder="Type your task here.." autocomplete="off">
              <input id="taskDate" type="date" aria-label="Task date">

              <button class="calendar-btn" type="button" id="dateButton" aria-label="Pick date"> <svg viewBox="0 0 24 24" aria-hidden="true"> <path d="M7 2a1 1 0 0 1 1 1v1h8V3a1 1 0 1 1 2 0v1h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2V3a1 1 0 0 1 1-1Zm13 8H4v10h16V10ZM4 8h16V6H4v2Zm4 5h2v2H8v-2Zm4 0h2v2h-2v-2Zm4 0h2v2h-2v-2Zm-8 4h2v2H8v-2Zm4 0h2v2h-2v-2Z" /> </svg> 
              </button>

              <button class="add-btn" type="submit"><b>+ Add</b></button>
            </form>

            <div class="task-meta">
              <div class="filters" aria-label="Task filters">
                <button class="filter active" type="button" data-filter="all">All</button>
                <span>|</span>
                <button class="filter" type="button" data-filter="active">Active</button>
                <span>|</span>
                <button class="filter" type="button" data-filter="completed">Completed</button>
              </div>

              <p id="taskCount">0 tasks left</p>
            </div>

            <ul class="task-list" id="taskList" aria-label="Tasks">

            </ul>
          </section>
        </main>

    </div>

</div>

  <script src="dashboard.js"></script>
</body>
</html>
